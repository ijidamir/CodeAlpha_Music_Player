<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
   <div class="container">
    <div class="music-player">
        <nav>
            <div class="circle" >
                <i class="fa-solid fa-angle-left"></i>
            </div>
            <div class="circle">
                <img src="images/menu_icon.svg"  id="menu" width="23" alt="">
            </div>
        </nav>
        <div class="song-info">
            <img src="images/image1.jpg" class="song-img">
            <h1 id="title">A New Wine</h1>
            <p id="artist">Lawrence oyor</p>
        </div>
        
        <div class="progress-container">
            <span id="currentTime">0:00</span>
            <input type="range" value="0" id="progress">
            <span id="duration">0:00</span>
        </div>
       <audio id="song" src="music/A_NEW_WINE__LAWRENCE_OYOR(128k).mp3" type="audio/mpeg"></audio>
        

       
        <div class="controls">
            <div><i class="fa-solid fa-backward" id="prevBtn"></i></div>
            <div onclick="PlayPause()" ><i class="fa-solid fa-play" id="ctrlIcon"></i></div>
            <div><i class="fa-solid fa-forward" id="nextBtn"></i></div>
        </div>


      <div class="volume-control">
        <div class="volume-icons" style="display: flex; justify-content:space-between; align-items:center;">
            <i class="fa-solid fa-volume-high"></i>
        <p class="volumeValue">100%</p>
        </div>
        
        <input type="range" id="volume" min="0"
        max="1" step="0.01" value="1">
      </div>
        
    </div>
   </div> 


   <script src="script.js"></script>
</body>
</html>
